name: Sync upstream main

on:
  schedule:
    - cron: '0 3 * * *'  # 每天凌晨 3 点自动运行
  workflow_dispatch:     # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/Aethersailor/Custom_OpenClash_Rules.git

      - name: Fetch upstream changes
        run: git fetch upstream

      - name: Merge upstream/main into local main (prefer upstream)
        run: |
          git checkout main
          git merge upstream/main --strategy-option theirs || true
          git commit -am "Auto-merged upstream/main with theirs strategy" || true

      - name: Push changes to origin
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

